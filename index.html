<style>
  :root {
    --bg: #11150f;

    --p1: #4fa3ff;

    --ink: #d8e0cc;

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    display: flex;

  .score { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
  .p1 { color: var(--p1); } .p1 .dot { background: var(--p1); }
  .p2 { color: var(--p2); } .p2 .dot { background: var(--p2); }
  #wrap {
    position: relative;
    border: 2px solid #2c3622;
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    width: min(94vw, 56vh, 578px);   /* scale to fit phone screens, cap at native */
  }
  canvas {
    display: block;
    border-radius: 4px;
    width: 100%;
    height: auto;                    /* square maze keeps 1:1 from intrinsic size */
    touch-action: none;
  }
  #banner {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;

  #banner.show { display: flex; }
  #banner .big { font-size: 30px; letter-spacing: 2px; }
  #banner .sub { font-size: 13px; opacity: 0.8; letter-spacing: 1px; }
  #controls {
    display: flex;
    gap: 40px;
    font-size: 12px;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
  #controls b { color: var(--ink); }
  #modebar { display: flex; gap: 8px; }
  button {
    background: #2c3622;
    color: var(--ink);
    border: 1px solid #4f6238;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: inherit;

    cursor: pointer;
    text-transform: uppercase;
  }
  button:hover { background: #3a4a2c; }
  button.active { background: #4f6238; border-color: #6f8a52; }
  kbd {
    background: #222a1a;
    border: 1px solid #4f6238;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
  }
  #aiPanel {
    display: none;
    justify-content: center;
    margin-top: 2px;
  }
  #onlinePanel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;

  }
  .olRow {

    flex-wrap: wrap;

  }
  .olLabel {
    opacity: 0.45;

  }

    background: #222a1a;

    font-family: inherit;

  #stats {

  /* ---- Touch controls: hidden on desktop, shown on touch devices ---- */
  #touchControls {
    display: none;
    width: min(94vw, 578px);
    justify-content: space-between;
    align-items: center;

    touch-action: none;
  }
  #stick {
    position: relative;
    width: 132px;

    border-radius: 50%;
    background: radial-gradient(circle at center, #313d26 0%, #232c1b 70%);

  }
  #knob {
    position: absolute;

  #fireBtn {

  #fireBtn:active { background: var(--p2); color: #11150f; }

  /* D-pad (alternate control scheme) */
  #dpad {
    display: grid;

    grid-template-rows: repeat(2, 56px);
    gap: 6px;

  #bUp { grid-column: 2; grid-row: 1; }

  #bDown { grid-column: 2; grid-row: 2; }
  #bRight { grid-column: 3; grid-row: 2; }
  .tbtn {
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    background: #2c3622;
    border: 1px solid #4f6238;
    border-radius: 10px;

    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .tbtn:active { background: #4f6238; }
  /* show one scheme at a time */
  #touchControls.scheme-stick #dpad { display: none; }
  #touchControls.scheme-dpad #stick { display: none; }
  #ctrlToggleRow { display: none; }
  #ctrlToggle { font-size: 11px; padding: 5px 12px; opacity: 0.85; }

  @media (pointer: coarse) {
    body { gap: 8px; padding: 6px 0; justify-content: flex-start; }
    h1 { font-size: 15px; margin-top: 4px; }
    #touchControls { display: flex; }
    #ctrlToggleRow { display: flex; justify-content: center; }
    #controls { display: none; }   /* keyboard legend irrelevant on phones */
    #mode2P { display: none; }     /* local 2P needs 2 keyboards — not playable on one phone */
    button { padding: 8px 12px; }  /* bigger tap targets for mode/online */
  }
</style>

    <div id="redControls"><b>Red</b> &nbsp; <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> move &middot; <kbd>Enter</kbd> fire</div>

        <button class="tbtn" id="bUp" data-k="w" aria-label="forward">▲</button>
        <button class="tbtn" id="bLeft" data-k="a" aria-label="turn left">◀</button>
        <button class="tbtn" id="bDown" data-k="s" aria-label="reverse">▼</button>
        <button class="tbtn" id="bRight" data-k="d" aria-label="turn right">▶</button>
      </div>

    <button id="fireBtn" aria-label="fire">FIRE</button>

<script>
(() => {
  "use strict";

  // ---- Maze (1 = wall, 0 = floor). Regenerated each round; outer ring solid. ----
  const ROWS = 17, COLS = 17;   // odd dims => clean perfect-maze cells + solid border
  const TILE = 34;
  const W = COLS * TILE;
  const H = ROWS * TILE;

  // Recursive-backtracker carve (cells on odd coords) + light braiding so it
  // plays open enough for a duel instead of a tunnel of dead ends.
  function generateMaze() {
    const g = [];
    for (let r = 0; r < ROWS; r++) g.push(new Array(COLS).fill(1));
    const inB = (r, c) => r > 0 && c > 0 && r < ROWS - 1 && c < COLS - 1;
    const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]];
    const stack = [[1, 1]];
    g[1][1] = 0;
    while (stack.length) {
      const [r, c] = stack[stack.length - 1];
      const order = dirs.slice();
      for (let i = order.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        const t = order[i]; order[i] = order[j]; order[j] = t;
      }
      let moved = false;
      for (const [dr, dc] of order) {
        const nr = r + dr, nc = c + dc;
        if (inB(nr, nc) && g[nr][nc] === 1) {
          g[r + dr / 2][c + dc / 2] = 0;   // knock the wall between the two cells
          g[nr][nc] = 0;
          stack.push([nr, nc]);
          moved = true;
          break;
        }
      }
      if (!moved) stack.pop();
    }
    // braid: open ~18% of interior walls -> loops + room to maneuver.
    // Only open a wall that already touches floor, so the floor stays one
    // connected region (never strand a tank in an isolated pocket).
    for (let r = 1; r < ROWS - 1; r++)
      for (let c = 1; c < COLS - 1; c++)
        if (g[r][c] === 1 && Math.random() < 0.18 &&
            (g[r - 1][c] === 0 || g[r + 1][c] === 0 || g[r][c - 1] === 0 || g[r][c + 1] === 0))
          g[r][c] = 0;
    return g.map((row) => row.join(""));
  }

  let MAZE = generateMaze();

  const canvas = document.getElementById("game");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  const banner = document.getElementById("banner");
  const bannerBig = document.getElementById("bannerBig");
  const bannerSub = document.getElementById("bannerSub");
  const scoreboardEl = document.getElementById("scoreboard");

  // ---- Wall helpers ----
  function isWallCell(c, r) {
    if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return true;
    return MAZE[r][c] === "1";
  }
  // Circle (tank/bullet) vs wall-cells: returns true if point/radius overlaps any wall.
  function circleHitsWall(x, y, radius) {
    const minC = Math.floor((x - radius) / TILE);
    const maxC = Math.floor((x + radius) / TILE);
    const minR = Math.floor((y - radius) / TILE);
    const maxR = Math.floor((y + radius) / TILE);
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        if (!isWallCell(c, r)) continue;
        const nx = Math.max(c * TILE, Math.min(x, c * TILE + TILE));
        const ny = Math.max(r * TILE, Math.min(y, r * TILE + TILE));
        const dx = x - nx, dy = y - ny;
        if (dx * dx + dy * dy < radius * radius) return true;
      }
    }
    return false;
  }

  // ---- Open floor cells, used to place tanks far apart (rebuilt each round) ----
  let floorCells = [];
  function recomputeFloors() {
    floorCells = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (MAZE[r][c] === "0") floorCells.push({ c, r });
  }
  recomputeFloors();

  function cellCenter(cell) {
    return { x: cell.c * TILE + TILE / 2, y: cell.r * TILE + TILE / 2 };
  }

  // ---- Input ----
  const keys = {};
  const FIRE1 = " ";
  const FIRE2 = "enter";
  window.addEventListener("keydown", (e) => {
    // don't hijack typing in the room-code field
    if (e.target && e.target.tagName === "INPUT") return;
    const k = e.key.toLowerCase();
    if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(k))
      e.preventDefault();
    keys[k] = true;
    if ((k === " " || k === "enter") && roundOver) handleFirePress();
  });
  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    keys[k] = false;
    if (k === " ") guestSuppressFire = false;
  });

  // The "fire" action also restarts a finished round. Shared by keyboard + touch.
  function handleFirePress() {
    if (!roundOver) return;
    if (mode === "guest") {
      guestSuppressFire = true;            // don't auto-fire the round-start press
      netSend({ t: "start" });             // only host owns startRound
    } else if (mode === "ai" || mode === "2p" || mode === "host") {
      if (matchOver) resetMatch();
      else startRound();
    }
  }

  // ---- Tank ----
  const TANK_R = TILE * 0.34;
  const TANK_SPEED = 95;          // px/sec
  const TANK_TURN = 3.0;          // rad/sec
  const RELOAD = 0.65;            // sec between shots
  const BULLET_SPEED = 230;       // px/sec
  const BULLET_R = 3.5;
  const BULLET_LIFE = 4.0;        // sec
  const MAX_BOUNCE = 5;          // bullet ricochets 5 times, dies on the 6th wall hit
  const MAX_PLAYERS = 6;
  const COLORS = [
    { name: "Blue",   css: "#4fa3ff" },
    { name: "Red",    css: "#ff6b4f" },
    { name: "Green",  css: "#5fd35f" },
    { name: "Yellow", css: "#ffd23f" },
    { name: "Purple", css: "#c06bff" },
    { name: "Cyan",   css: "#3fe0d0" },
  ];

  // ---- Powerup runes ----
  const POWERUPS = [
    { key: "speed",  css: "#ffd23f", glyph: "»" },   // move faster
    { key: "rapid",  css: "#ff6b4f", glyph: "∞" },   // near-zero reload
    { key: "bounce", css: "#3fe0d0", glyph: "⟳" },   // bullets bounce more
  ];
  const POW_KEYS = POWERUPS.map((p) => p.key);
  const POW_DURATION = 8;        // sec a buff lasts after pickup
  const POW_SPAWN_EVERY = 6;     // sec between rune spawns
  const POW_MAX_FIELD = 3;       // max runes on the maze at once
  const SPEED_MULT = 1.7;        // speed buff multiplier
  const RAPID_RELOAD = 0.10;     // reload while rapid-fire buff active
  const BOUNCE_MAX = 10;         // bounces while bounce buff active
  const RUNE_R = TILE * 0.30;

  class Tank {
    constructor(index) {
      this.index = index;
      this.name = COLORS[index].name;
      this.label = "";              // custom player name (falls back to color name)
      this.css = COLORS[index].css;
      this.kind = "local";          // local | local2 | ai | remote
      this.x = 0; this.y = 0; this.angle = 0;
      this.cooldown = 0; this.alive = false;
      this.score = 0; this.respawnIn = 0;
      this.input = { fwd: false, back: false, left: false, right: false, fire: false };
      this.aiTurnGoal = 0; this.aiRepathIn = 0; this.aiNext = null; this.aiGoal = null; this.aiDodgeT = 0;
      this.prevX = 0; this.prevY = 0; this.vx = 0; this.vy = 0;   // velocity (for AI lead-aim)
      this.buffs = { speed: 0, rapid: 0, bounce: 0 };  // remaining seconds each
      this.bf = 0;                  // buff bitmask (for render; synced to guests)
    }
    reset(cell) {
      const center = cellCenter(cell);
      this.x = center.x;
      this.y = center.y;
      this.angle = Math.random() * Math.PI * 2;
      this.cooldown = 0;
      this.alive = true;
      this.respawnIn = 0;
      this.input.fwd = this.input.back = this.input.left = this.input.right = this.input.fire = false;
      this.aiTurnGoal = this.angle;
      this.aiRepathIn = 0; this.aiNext = null; this.aiGoal = null; this.aiDodgeT = 0;
      this.prevX = this.x; this.prevY = this.y; this.vx = 0; this.vy = 0;
      this.buffs.speed = this.buffs.rapid = this.buffs.bounce = 0;
      this.bf = 0;
    }
    tryMove(dist) {
      const nx = this.x + Math.cos(this.angle) * dist;
      const ny = this.y + Math.sin(this.angle) * dist;
      // axis-separated so tanks slide along walls instead of sticking
      if (!circleHitsWall(nx, this.y, TANK_R)) this.x = nx;
      if (!circleHitsWall(this.x, ny, TANK_R)) this.y = ny;
    }
    canFire() { return this.cooldown <= 0; }
    fire(bullets) {
      if (!this.canFire()) return;
      this.cooldown = this.buffs.rapid > 0 ? RAPID_RELOAD : RELOAD;
      const mx = this.x + Math.cos(this.angle) * (TANK_R + BULLET_R + 1);
      const my = this.y + Math.sin(this.angle) * (TANK_R + BULLET_R + 1);
      const b = new Bullet(mx, my, this.angle, this);
      b.maxBounce = this.buffs.bounce > 0 ? BOUNCE_MAX : MAX_BOUNCE;
      bullets.push(b);
    }
  }

  class Bullet {
    constructor(x, y, angle, owner) {
      this.x = x; this.y = y;
      this.vx = Math.cos(angle) * BULLET_SPEED;
      this.vy = Math.sin(angle) * BULLET_SPEED;
      this.owner = owner;
      this.life = BULLET_LIFE;
      this.bounces = 0;
      this.maxBounce = MAX_BOUNCE;   // raised per-bullet when fired with the bounce buff
      this.dead = false;
      this.armTime = 0.06; // brief self-immunity so muzzle doesn't self-kill
    }
    step(dt) {
      this.life -= dt;
      this.armTime -= dt;
      if (this.life <= 0) { this.dead = true; return; }

      // move X, bounce on wall
      let nx = this.x + this.vx * dt;
      if (circleHitsWall(nx, this.y, BULLET_R)) {
        this.vx = -this.vx;
        nx = this.x + this.vx * dt;
        if (++this.bounces > this.maxBounce) { this.dead = true; return; }
      }
      this.x = nx;

      // move Y, bounce on wall
      let ny = this.y + this.vy * dt;
      if (circleHitsWall(this.x, ny, BULLET_R)) {
        this.vy = -this.vy;
        ny = this.y + this.vy * dt;
        if (++this.bounces > this.maxBounce) { this.dead = true; return; }
      }
      this.y = ny;
    }
  }

  // ---- Game state ----
  // modes: "ai" | "2p" | "lobby" (online, not connected) | "host" | "guest"
  let mode = "ai";
  let players = [];             // all tanks in play (array index === color slot)
  let myId = 0;                 // index of the locally-controlled player
  let bullets = [];
  let powerups = [];            // runes on the maze: {type, c, r, x, y}
  let pwTimer = POW_SPAWN_EVERY;
  let roundOver = false;
  let lastWinner = null;        // winner player index | "draw" | null (synced to guest)
  let endTimer = 0;
  let aiLevel = "medium";       // bot difficulty: "easy" | "medium" | "hard"
  let submode = "standing";     // "standing" (last alive wins) | "respawn" (deathmatch)
  let hostSubmode = "standing"; // host's pick before hosting
  const RESPAWN_DELAY = 2.0;    // seconds dead before respawning (deathmatch)
  let matchOver = false;        // someone hit the target -> match frozen until rematch
  let matchTarget = 0;          // 0 = endless; else win at N (kills / round wins)
  let hostTarget = 0;           // host's pick before hosting

  function mkTank(index, kind) { const t = new Tank(index); t.kind = kind; return t; }
  // Roster for a local mode. Online rosters are managed by the connection
  // handlers (host) / state packets (guest).
  function setupPlayers(forMode) {
    if (forMode === "ai") players = [mkTank(0, "local"), mkTank(1, "ai")];
    else if (forMode === "2p") players = [mkTank(0, "local"), mkTank(1, "local2")];
    else players = [];
    myId = 0;
  }

  // ---- Net state ----
  let peer = null, conn = null, role = null;   // role: "host" | "guest"
  let conns = [];                              // host: [{conn, slot, lastMsg}]
  let guestSuppressFire = false;               // guest: swallow the round-start Space
  let lastPeerMsg = 0;                          // perf-time of last packet from the other side
  const STALE_MS = 10000;                       // no packets this long => treat as disconnected
  let roomCode = "", joinUrl = "";              // current hosted room + its shareable link

  function randFloor() { return floorCells[(Math.random() * floorCells.length) | 0]; }
  // n spawn cells spread apart (greedy farthest-point sampling).
  function spawnCells(n) {
    const cells = [randFloor()];
    while (cells.length < n) {
      let best = null, bestD = -1;
      for (let i = 0; i < 40; i++) {
        const cand = randFloor();
        let minD = Infinity;
        for (const c of cells) {
          const d = (cand.c - c.c) ** 2 + (cand.r - c.r) ** 2;
          if (d < minD) minD = d;
        }
        if (minD > bestD) { bestD = minD; best = cand; }
      }
      cells.push(best);
    }
    return cells;
  }

  function startRound() {
    MAZE = generateMaze();                      // fresh maze every round
    recomputeFloors();
    if (role === "host") broadcast({ t: "m", m: MAZE });  // stream the maze to guests
    const cells = spawnCells(Math.max(1, players.length));
    players.forEach((p, i) => p && p.reset(cells[i]));
    bullets = [];
    powerups = [];
    pwTimer = POW_SPAWN_EVERY;
    roundOver = false;
    matchOver = false;
    lastWinner = null;
    endTimer = 0;
    keys[" "] = false;       // consume the Space/Enter that started the round
    keys["enter"] = false;   // so the fresh tank doesn't fire on spawn
    players.forEach((p) => p && (p.input.fire = false));  // no auto-fire on spawn
    banner.classList.remove("show");
  }

  function endRound(winner) {  // winner: player object | null (draw)
    if (roundOver) return;
    roundOver = true;
    if (winner) winner.score++;
    lastWinner = winner ? winner.index : "draw";
    updateScoreboard();
    if (winner && matchTarget > 0 && winner.score >= matchTarget) matchOver = true;
    showResult(lastWinner);
  }

  // Restart a finished match: zero scores, fresh maze, everyone back in.
  function resetMatch() {
    players.forEach((p) => p && (p.score = 0));
    matchOver = false;
    updateScoreboard();
    startRound();
  }

  // ---- Player display names (custom, falls back to color) ----
  const nameInput = document.getElementById("nameInput");
  try { nameInput.value = (localStorage.getItem("tm_name") || "").slice(0, 12); } catch (_) {}
  nameInput.addEventListener("input", () => {
    try { localStorage.setItem("tm_name", nameInput.value.slice(0, 12)); } catch (_) {}
  });
  function myDisplayName() { return (nameInput.value || "").trim().slice(0, 12); }
  function dn(p) { return p && p.label ? p.label : (p ? p.name : ""); }   // display name
  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function updateScoreboard() {
    const present = players.filter(Boolean);
    scoreboardEl.innerHTML = present.map((p) =>
      '<div class="score" style="color:' + p.css + '">' +
      '<span class="dot" style="background:' + p.css + '"></span>' + p.score + (matchTarget ? '/' + matchTarget : '') + ' ' + esc(dn(p)) +
      '</div>'
    ).join("");
  }

  // Banner text for a finished round (winner = player index | "draw").
  // Host shows it locally; guest shows it from the synced winner.
  function showResult(w) {
    if (matchOver) {
      const mp = (w !== "draw" && w != null) ? players[w] : null;
      bannerBig.textContent = (mp ? dn(mp).toUpperCase() : "MATCH") + " WINS THE MATCH";
      bannerBig.style.color = mp ? mp.css : "var(--ink)";
      bannerSub.innerHTML = 'Press <kbd>Space</kbd> to rematch';
      banner.classList.add("show");
      return;
    }
    if (w === "draw" || w == null) {
      bannerBig.textContent = "DRAW";
      bannerBig.style.color = "var(--ink)";
    } else {
      const p = players[w];
      const lose = mode === "ai" && w !== 0;   // 1v1 vs computer; you are index 0
      bannerBig.textContent = lose ? "YOU LOSE" : ((p ? dn(p).toUpperCase() : "WINNER") + (lose ? "" : " WINS"));
      bannerBig.style.color = p ? p.css : "var(--ink)";
    }
    bannerSub.innerHTML = 'Press <kbd>Space</kbd> or <kbd>Enter</kbd> to play next round';
    banner.classList.add("show");
  }

  // ---- Line-of-sight: is target visible (no wall between)? ----
  function hasLineOfSight(ax, ay, bx, by) {
    const dist = Math.hypot(bx - ax, by - ay);
    const steps = Math.ceil(dist / (TILE * 0.4));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const px = ax + (bx - ax) * t;
      const py = ay + (by - ay) * t;
      if (isWallCell(Math.floor(px / TILE), Math.floor(py / TILE))) return false;
    }
    return true;
  }

  function angleDiff(a, b) {
    let d = (b - a) % (Math.PI * 2);
    if (d > Math.PI) d -= Math.PI * 2;
    if (d < -Math.PI) d += Math.PI * 2;
    return d;
  }

  // ---- AI helpers ----
  function nearestOpponent(self) {
    let best = null, bestD = Infinity;
    for (const p of players) {
      if (!p || p === self || !p.alive) continue;
      const d = (p.x - self.x) ** 2 + (p.y - self.y) ** 2;
      if (d < bestD) { bestD = d; best = p; }
    }
    return best;
  }
  function nearestRune(self) {
    let best = null, bestD = Infinity;
    for (const r of powerups) {
      const d = (r.x - self.x) ** 2 + (r.y - self.y) ** 2;
      if (d < bestD) { bestD = d; best = r; }
    }
    return best ? { rune: best, dist: Math.sqrt(bestD) } : null;
  }
  // An enemy bullet within range and heading roughly at me?
  function incomingBullet(self) {
    for (const b of bullets) {
      if (b.owner === self) continue;
      const dx = self.x - b.x, dy = self.y - b.y;
      const dist = Math.hypot(dx, dy);
      if (dist > TILE * 3.2 || dist < 1) continue;
      const bl = Math.hypot(b.vx, b.vy) || 1;
      if ((b.vx * dx + b.vy * dy) / (bl * dist) > 0.6) return b;   // closing on me
    }
    return null;
  }
  function cellOf(x, y) { return { c: Math.floor(x / TILE), r: Math.floor(y / TILE) }; }
  // BFS on floor cells: first step from `from` toward `to` (4-dir). null if blocked.
  function bfsNext(from, to) {
    if (from.c === to.c && from.r === to.r) return null;
    const key = (c, r) => r * COLS + c;
    const start = key(from.c, from.r), goal = key(to.c, to.r);
    const prev = new Map([[start, -1]]);
    const q = [start];
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    for (let h = 0; h < q.length; h++) {
      const cur = q[h], cc = cur % COLS, cr = (cur - cc) / COLS;
      if (cur === goal) break;
      for (const [dc, dr] of dirs) {
        const nc = cc + dc, nr = cr + dr;
        if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS || isWallCell(nc, nr)) continue;
        const nk = key(nc, nr);
        if (prev.has(nk)) continue;
        prev.set(nk, cur);
        q.push(nk);
      }
    }
    if (!prev.has(goal)) return null;
    let cur = goal, p = prev.get(goal);
    while (p !== -1 && p !== start) { cur = p; p = prev.get(p); }   // walk back to first step
    return { c: cur % COLS, r: (cur - (cur % COLS)) / COLS };
  }
  // BFS over the whole floor from `from`; returns step-distance + parent for every reachable cell.
  function bfsField(from) {
    const key = (c, r) => r * COLS + c;
    const start = key(from.c, from.r);
    const dist = new Map([[start, 0]]), prev = new Map([[start, -1]]);
    const q = [start], dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    for (let h = 0; h < q.length; h++) {
      const cur = q[h], cc = cur % COLS, cr = (cur - cc) / COLS;
      for (const [dc, dr] of dirs) {
        const nc = cc + dc, nr = cr + dr;
        if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS || isWallCell(nc, nr)) continue;
        const nk = key(nc, nr);
        if (dist.has(nk)) continue;
        dist.set(nk, dist.get(cur) + 1); prev.set(nk, cur); q.push(nk);
      }
    }
    return { dist, prev, start };
  }
  const FIRE_MIN = TILE * 2.5, FIRE_MAX = TILE * 7;   // bot's preferred shooting band
  // Tactical goal CELL: the nearest-by-path floor cell that can SEE the target
  // from a shooting distance (not point-blank). Picks randomly among the closest
  // few so the bot flanks from varying spots instead of charging the same corner.
  function pickFiringCell(self, target) {
    const field = bfsField(cellOf(self.x, self.y));
    const spots = [];
    for (const [k, d] of field.dist) {
      const cc = k % COLS, cr = (k - cc) / COLS;
      const cx = cc * TILE + TILE / 2, cy = cr * TILE + TILE / 2;
      const td = Math.hypot(target.x - cx, target.y - cy);
      if (td < FIRE_MIN || td > FIRE_MAX) continue;
      if (!hasLineOfSight(cx, cy, target.x, target.y)) continue;
      spots.push({ k, d });
    }
    if (!spots.length) return null;
    spots.sort((a, b) => a.d - b.d);
    const k = spots.slice(0, Math.min(4, spots.length))[(Math.random() * Math.min(4, spots.length)) | 0].k;
    return { c: k % COLS, r: (k - (k % COLS)) / COLS };
  }
  function cellReached(self, cell) {
    return cell && Math.hypot((cell.c * TILE + TILE / 2) - self.x, (cell.r * TILE + TILE / 2) - self.y) < TILE * 0.5;
  }

  // Aim heading at the target; Hard leads the shot using the target's velocity.
  function aimAngle(self, target, hard) {
    if (!hard) return Math.atan2(target.y - self.y, target.x - self.x);
    const d = Math.hypot(target.x - self.x, target.y - self.y);
    const t = d / BULLET_SPEED;                                   // time for a bullet to arrive
    return Math.atan2((target.y + target.vy * t) - self.y, (target.x + target.vx * t) - self.x);
  }

  function updateAI(self, dt) {
    if (!self.alive) return;
    if (aiLevel === "easy") updateAIEasy(self, dt);
    else updateAISmart(self, dt, aiLevel === "hard");
  }

  // EASY: aim & fire on line of sight, random wander otherwise. No pathing/dodge.
  function updateAIEasy(self, dt) {
    const target = nearestOpponent(self);
    if (!target) return;
    const los = hasLineOfSight(self.x, self.y, target.x, target.y);
    let desired;
    if (los) {
      desired = Math.atan2(target.y - self.y, target.x - self.x);
    } else {
      self.aiRepathIn -= dt;
      if (self.aiRepathIn <= 0) {
        self.aiTurnGoal = self.angle + (Math.random() - 0.5) * Math.PI * 1.2;
        self.aiRepathIn = 0.6 + Math.random() * 0.8;
      }
      desired = self.aiTurnGoal;
    }
    const diff = angleDiff(self.angle, desired);
    const turn = TANK_TURN * dt;
    self.angle += Math.max(-turn, Math.min(turn, diff));
    const before = { x: self.x, y: self.y };
    self.tryMove(TANK_SPEED * (self.buffs.speed > 0 ? SPEED_MULT : 1) * dt);
    if (Math.hypot(self.x - before.x, self.y - before.y) < TANK_SPEED * dt * 0.3 && !los) {
      self.aiTurnGoal = self.angle + (Math.random() < 0.5 ? 1 : -1) * (0.7 + Math.random());
      self.aiRepathIn = 0.5;
    }
    if (los && Math.abs(diff) < 0.20 && self.canFire()) self.fire(bullets);
  }

  // MEDIUM / HARD: don't blindly charge — approach to a line-of-sight firing spot
  // at range and snipe. Grab runes, dodge bullets, kite if the player closes in.
  // Commits to a goal cell (no per-frame re-randomizing) so it actually arrives.
  // (Hard leads shots + repaths faster.)
  function updateAISmart(self, dt, hard) {
    const target = nearestOpponent(self);
    if (!target) return;
    const los = hasLineOfSight(self.x, self.y, target.x, target.y);
    const targDist = Math.hypot(target.x - self.x, target.y - self.y);
    const aimA = aimAngle(self, target, hard);

    self.aiDodgeT -= dt;
    const threat = incomingBullet(self);
    if (threat && self.aiDodgeT <= 0) {
      const bAng = Math.atan2(threat.vy, threat.vx);
      self.aiTurnGoal = bAng + Math.PI / 2 * (Math.random() < 0.5 ? 1 : -1);  // swerve aside
      self.aiDodgeT = 0.4;
    }

    let desired, move = true;
    if (self.aiDodgeT > 0) {
      desired = self.aiTurnGoal;                                   // commit the swerve briefly
    } else if (los && targDist >= FIRE_MIN && targDist <= FIRE_MAX) {
      desired = aimA; move = false; self.aiGoal = null;            // good range + sight: hold & snipe
    } else {
      // commit to a goal cell until reached (no mid-approach re-randomizing, or it
      // thrashes and never arrives). The los-snipe branch above interrupts en route.
      if (!self.aiGoal || cellReached(self, self.aiGoal)) {
        const rn = nearestRune(self);
        if (rn && rn.dist < targDist * 0.7) self.aiGoal = cellOf(rn.rune.x, rn.rune.y);
        else self.aiGoal = pickFiringCell(self, target) || cellOf(target.x, target.y);
      }
      const step = bfsNext(cellOf(self.x, self.y), self.aiGoal);
      if (step) {
        desired = Math.atan2((step.r * TILE + TILE / 2) - self.y, (step.c * TILE + TILE / 2) - self.x);
      } else if (los) {
        desired = aimA;
      } else {
        self.aiTurnGoal = self.angle + (Math.random() - 0.5) * Math.PI;                 // fallback wander
        desired = self.aiTurnGoal;
      }
    }

    const diff = angleDiff(self.angle, desired);
    const turn = TANK_TURN * dt;
    self.angle += Math.max(-turn, Math.min(turn, diff));

    if (move) {
      const before = { x: self.x, y: self.y };
      self.tryMove(TANK_SPEED * (self.buffs.speed > 0 ? SPEED_MULT : 1) * dt);
      if (Math.hypot(self.x - before.x, self.y - before.y) < TANK_SPEED * dt * 0.3) {
        self.aiGoal = null; self.aiRepathIn = 0;                   // stuck -> pick a new goal
      }
    }

    const fireDiff = angleDiff(self.angle, aimA);
    if (los && Math.abs(fireDiff) < 0.22 && self.canFire()) self.fire(bullets);
  }

  // ---- Player control ----
  // Read a normalized input struct off the global keyboard for a given keymap.
  function readInput(kFwd, kBack, kLeft, kRight, kFire) {
    return {
      fwd: !!keys[kFwd], back: !!keys[kBack],
      left: !!keys[kLeft], right: !!keys[kRight], fire: !!keys[kFire],
    };
  }
  // Apply a normalized input struct to a tank. Used identically for local
  // players and for the remote (guest) player on the host's simulation.
  function driveTank(tank, dt, inp) {
    if (!tank.alive) return;
    const spd = TANK_SPEED * (tank.buffs.speed > 0 ? SPEED_MULT : 1);
    if (inp.left) tank.angle -= TANK_TURN * dt;
    if (inp.right) tank.angle += TANK_TURN * dt;
    if (inp.fwd) tank.tryMove(spd * dt);
    if (inp.back) tank.tryMove(-spd * dt * 0.6);
    if (inp.fire) tank.fire(bullets);
  }

  function tankHit(bullet, tank) {
    if (!tank.alive) return false;
    if (bullet.owner === tank && bullet.armTime > 0) return false;
    const dx = bullet.x - tank.x, dy = bullet.y - tank.y;
    return dx * dx + dy * dy < (TANK_R + BULLET_R) ** 2;
  }

  // ---- Update loop ----
  function update(dt) {
    if (roundOver) return;

    for (const p of players) if (p) p.cooldown = Math.max(0, p.cooldown - dt);
    for (const p of players) {
      if (!p) continue;
      if (p.kind === "ai") { updateAI(p, dt); continue; }
      let inp;
      if (p.kind === "local") inp = readInput("w", "s", "a", "d", FIRE1);
      else if (p.kind === "local2") inp = readInput("arrowup", "arrowdown", "arrowleft", "arrowright", FIRE2);
      else inp = p.input;                      // remote: filled by net
      driveTank(p, dt, inp);
    }

    for (const b of bullets) {
      b.step(dt);
      if (b.dead) continue;
      for (const p of players) {
        if (p && tankHit(b, p)) { onKill(b, p); b.dead = true; break; }
      }
    }
    bullets = bullets.filter((b) => !b.dead);
    updatePowerups(dt);

    const present = players.filter(Boolean);
    if (submode === "respawn") {
      // deathmatch: dead tanks respawn after a delay; never ends on its own
      for (const p of present) {
        if (!p.alive) { p.respawnIn -= dt; if (p.respawnIn <= 0) respawnTank(p); }
      }
    } else {
      // last-standing: round ends when <=1 tank remains
      const alive = present.filter((p) => p.alive);
      if (present.length >= 2 && alive.length <= 1) {
        endTimer += dt;
        if (endTimer > 0.7) endRound(alive[0] || null);
      }
    }

    // per-tank velocity (used by Hard bot's lead-aim)
    if (dt > 0) for (const p of present) {
      p.vx = (p.x - p.prevX) / dt; p.vy = (p.y - p.prevY) / dt;
      p.prevX = p.x; p.prevY = p.y;
    }
  }

  // A bullet hit a tank.
  function onKill(bullet, victim) {
    victim.alive = false;
    if (submode === "respawn") {
      victim.respawnIn = RESPAWN_DELAY;
      const killer = bullet.owner;
      if (killer && killer !== victim) {
        killer.score++; updateScoreboard();                          // frag
        if (matchTarget > 0 && killer.score >= matchTarget) {
          matchOver = true; roundOver = true; lastWinner = killer.index; showResult(lastWinner);
        }
      }
    }
  }

  // Deathmatch respawn: a floor cell away from any living enemy.
  function respawnTank(p) {
    let cell = randFloor();
    for (let i = 0; i < 20; i++) {
      const cand = randFloor();
      const cx = cand.c * TILE + TILE / 2, cy = cand.r * TILE + TILE / 2;
      let ok = true;
      for (const q of players) {
        if (q && q !== p && q.alive && (q.x - cx) ** 2 + (q.y - cy) ** 2 < (TILE * 3) ** 2) { ok = false; break; }
      }
      if (ok) { cell = cand; break; }
    }
    p.reset(cell);
  }

  // ---- Powerup runes (host / local sim only; guests just render synced state) ----
  function updatePowerups(dt) {
    // tick buff timers + recompute each tank's buff bitmask
    for (const p of players) {
      if (!p) continue;
      let m = 0;
      for (let k = 0; k < POW_KEYS.length; k++) {
        const key = POW_KEYS[k];
        if (p.buffs[key] > 0) {
          p.buffs[key] = Math.max(0, p.buffs[key] - dt);
          if (p.buffs[key] > 0) m |= (1 << k);
        }
      }
      p.bf = m;
    }
    // spawn on a timer, up to the field cap
    pwTimer -= dt;
    if (pwTimer <= 0) { pwTimer = POW_SPAWN_EVERY; trySpawnPowerup(); }
    // pickups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const r = powerups[i];
      for (const p of players) {
        if (!p || !p.alive) continue;
        const dx = p.x - r.x, dy = p.y - r.y;
        if (dx * dx + dy * dy < (TANK_R + RUNE_R) ** 2) {
          p.buffs[POW_KEYS[r.type]] = POW_DURATION;
          powerups.splice(i, 1);
          break;
        }
      }
    }
  }
  function trySpawnPowerup() {
    if (powerups.length >= POW_MAX_FIELD || !floorCells.length) return;
    for (let tries = 0; tries < 20; tries++) {
      const cell = randFloor();
      const x = cell.c * TILE + TILE / 2, y = cell.r * TILE + TILE / 2;
      let ok = true;
      for (const p of players) if (p && p.alive && (p.x - x) ** 2 + (p.y - y) ** 2 < (TILE * 1.2) ** 2) { ok = false; break; }
      if (ok) for (const r of powerups) if ((r.x - x) ** 2 + (r.y - y) ** 2 < (TILE * 1.2) ** 2) { ok = false; break; }
      if (ok) { powerups.push({ type: (Math.random() * POWERUPS.length) | 0, c: cell.c, r: cell.r, x, y }); return; }
    }
  }

  // ---- Render ----
  function drawMaze() {
    ctx.fillStyle = getCSS("--floor");
    ctx.fillRect(0, 0, W, H);
    const wall = getCSS("--wall");
    const edge = getCSS("--wall-edge");
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (MAZE[r][c] !== "1") continue;
        const x = c * TILE, y = r * TILE;
        ctx.fillStyle = wall;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = edge;
        ctx.fillRect(x, y, TILE, 3);
        ctx.fillRect(x, y, 3, TILE);
      }
    }
  }

  function drawTank(t) {
    if (!t.alive) return;
    const main = t.css;
    // buff aura: one ring per active buff, in that buff's colour
    if (t.bf) {
      for (let k = 0; k < POWERUPS.length; k++) {
        if (!(t.bf & (1 << k))) continue;
        ctx.beginPath();
        ctx.arc(t.x, t.y, TANK_R + 4 + k * 3, 0, Math.PI * 2);
        ctx.strokeStyle = POWERUPS[k].css;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.85;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle);
    // body
    ctx.fillStyle = main;
    const s = TANK_R;
    ctx.fillRect(-s, -s * 0.85, s * 2, s * 1.7);
    // treads
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(-s, -s * 0.95, s * 2, s * 0.28);
    ctx.fillRect(-s, s * 0.67, s * 2, s * 0.28);
    // barrel
    ctx.fillStyle = "#e9efe0";
    ctx.fillRect(s * 0.2, -s * 0.18, s * 1.5, s * 0.36);
    // turret
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fill();
    ctx.restore();
  }

  function drawBullet(b) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
    ctx.fillStyle = "#ffe27a";
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawPowerup(r) {
    const def = POWERUPS[r.type];
    ctx.save();
    ctx.translate(r.x, r.y);
    // soft glow + rune body
    ctx.globalAlpha = 0.18;
    ctx.beginPath(); ctx.arc(0, 0, RUNE_R + 4, 0, Math.PI * 2); ctx.fillStyle = def.css; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(0, 0, RUNE_R, 0, Math.PI * 2);
    ctx.fillStyle = "#11150f"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = def.css; ctx.stroke();
    ctx.fillStyle = def.css;
    ctx.font = "bold " + Math.round(RUNE_R * 1.4) + "px monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(def.glyph, 0, 1);
    ctx.restore();
  }

  function render() {
    drawMaze();
    for (const r of powerups) drawPowerup(r);
    bullets.forEach(drawBullet);
    for (const p of players) if (p) drawTank(p);
  }

  // CSS var reader (cached)
  const cssCache = {};
  function getCSS(name) {
    if (!cssCache[name])
      cssCache[name] = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return cssCache[name];
  }

  // ---- Main loop ----
  let last = performance.now();
  let netAccum = 0;
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // clamp big tab-switch gaps

    updateJoystick();         // touch stick -> key state for the controlled tank

    if (mode === "host") {
      // backstop for PeerJS's unreliable close: prune guests that went silent
      for (const e of conns.slice()) if (now - e.lastMsg > STALE_MS) removeGuest(e.slot);
      update(dt);
      netAccum += dt;       // stream state ~40Hz
      if (netAccum >= 0.025) { netAccum = 0; sendState(); }
    } else if (mode === "guest") {
      if (conn && now - lastPeerMsg > STALE_MS) handleDisconnect();
      sendInput();          // guest only sends input; render uses last packet
    } else if (mode !== "lobby") {
      update(dt);           // ai / 2p
    }
    // lobby: no simulation, just render the frozen board

    render();
    requestAnimationFrame(frame);
  }

  // ---- Networking (host-authoritative WebRTC via PeerJS) ----
  // Host runs the whole simulation and owns Blue; the guest owns Red, sends its
  // key presses, and just renders whatever state the host streams back.
  // guest -> host (single connection)
  function netSend(obj) {
    if (conn && conn.open) { try { conn.send(obj); } catch (e) {} }
  }
  // host -> all guests
  function broadcast(obj) {
    for (const e of conns) if (e.conn.open) { try { e.conn.send(obj); } catch (_) {} }
  }

  function sendState() {
    if (!conns.length) return;
    broadcast({
      t: "s",
      ps: players.filter(Boolean).map((p) => ({
        i: p.index, x: Math.round(p.x), y: Math.round(p.y),
        a: +p.angle.toFixed(3), al: p.alive, sc: p.score, nm: p.label, bf: p.bf,
      })),
      bl: bullets.map((b) => [Math.round(b.x), Math.round(b.y)]),
      pw: powerups.map((r) => [r.type, Math.round(r.x), Math.round(r.y)]),
      ro: roundOver, w: lastWinner, md: submode, mo: matchOver, tg: matchTarget,
    });
  }

  function sendInput() {
    if (!conn || !conn.open) return;
    netSend({
      t: "i",
      f: !!keys["w"], b: !!keys["s"], l: !!keys["a"], r: !!keys["d"],
      x: !!keys[" "] && !guestSuppressFire,
    });
  }

  // ---- Guest: apply host state (roster can be sparse — slots may be empty) ----
  function applyState(m) {
    if (m.md) submode = m.md;
    matchTarget = m.tg || 0;
    matchOver = !!m.mo;
    const present = new Set();
    let maxI = -1;
    for (const ps of m.ps) {
      present.add(ps.i);
      if (ps.i > maxI) maxI = ps.i;
      let p = players[ps.i];
      if (!p) p = players[ps.i] = mkTank(ps.i, "remote");
      p.x = ps.x; p.y = ps.y; p.angle = ps.a; p.alive = ps.al; p.score = ps.sc; p.label = ps.nm || ""; p.bf = ps.bf || 0;
    }
    for (let i = 0; i <= maxI; i++) if (!present.has(i)) players[i] = null;
    players.length = maxI + 1;
    bullets = (m.bl || []).map(([x, y]) => ({ x, y }));
    powerups = (m.pw || []).map(([type, x, y]) => ({ type, x, y }));
    updateScoreboard();
    roundOver = m.ro;
    if (m.ro) showResult(m.w);
    else banner.classList.remove("show");
  }

  // guest packets
  function onData(msg) {
    if (!msg || typeof msg !== "object") return;
    lastPeerMsg = performance.now();
    if (msg.t === "you") { myId = msg.i; setControlsLegend(); }
    else if (msg.t === "m") MAZE = msg.m;
    else if (msg.t === "s") applyState(msg);
  }

  // ---- Host: per-connection plumbing ----
  function freeSlot() {
    for (let i = 1; i < MAX_PLAYERS; i++) if (!players[i]) return i;  // slot 0 = host
    return -1;
  }
  function onGuestOpen(c) {
    const slot = freeSlot();
    if (slot < 0) { try { c.close(); } catch (_) {} return; }   // room full
    if (!players[0]) players[0] = mkTank(0, "local");
    players[0].label = myDisplayName();        // host's own name
    myId = 0;
    players[slot] = mkTank(slot, "remote");
    conns.push({ conn: c, slot, lastMsg: performance.now() });
    try { c.send({ t: "you", i: slot }); } catch (_) {}
    try { c.send({ t: "m", m: MAZE }); } catch (_) {}   // current maze (esp. for late joiners)
    mode = "host"; setActiveBtns(); setControlsLegend();
    updateScoreboard();
    if (conns.length === 1) startRound();        // first guest -> fresh round for all
    else players[slot].reset(randFloor());        // late joiner spawns straight in
    hostStatus();
  }
  function onHostData(slot, msg) {
    if (!msg || typeof msg !== "object") return;
    const e = conns.find((x) => x.slot === slot);
    if (e) e.lastMsg = performance.now();
    if (msg.t === "i") {
      const p = players[slot];
      if (p) { p.input.fwd = !!msg.f; p.input.back = !!msg.b; p.input.left = !!msg.l; p.input.right = !!msg.r; p.input.fire = !!msg.x; }
    } else if (msg.t === "nm") {
      const p = players[slot];
      if (p) { p.label = String(msg.name || "").trim().slice(0, 12); updateScoreboard(); }
    } else if (msg.t === "start") {
      if (matchOver) resetMatch();               // any player can trigger rematch / next round
      else if (roundOver) startRound();
    }
  }
  function removeGuest(slot) {
    conns = conns.filter((e) => e.slot !== slot);
    players[slot] = null;
    updateScoreboard();
    if (conns.length === 0 && (mode === "host")) {
      // everyone left — keep the room open and wait for new joiners
      roundOver = true;
      bannerBig.textContent = "WAITING";
      bannerBig.style.color = "var(--ink)";
      bannerSub.innerHTML = "All players left. Waiting for someone to join…";
      banner.classList.add("show");
    }
    hostStatus();
  }
  function hostStatus() {
    if (mode !== "host") return;
    const n = conns.length + 1;
    const mn = submode === "respawn" ? "Deathmatch" : "Last Standing";
    const tg = matchTarget ? " · first to " + matchTarget : "";
    setNetStatus('Hosting <b>' + roomCode + '</b> · ' + mn + tg + ' · ' + n + ' player' + (n === 1 ? "" : "s") +
      '. You are <b style="color:' + COLORS[0].css + '">Blue</b>.');
  }

  function bindConn(c, onOpen) {
    conn = c;
    c.on("open", () => { lastPeerMsg = performance.now(); onOpen(); });
    c.on("data", onData);
    c.on("close", handleDisconnect);           // fires sometimes; heartbeat is the backstop
    c.on("error", () => setNetStatus('<span style="color:var(--p2)">Connection error</span>'));
  }

  function handleDisconnect() {
    if (mode !== "host" && mode !== "guest") return;   // only while in a live session
    conn = null;
    mode = "lobby";
    setActiveBtns(); setControlsLegend();
    bannerBig.textContent = "DISCONNECTED";
    bannerBig.style.color = "var(--p2)";
    bannerSub.innerHTML = "Friend disconnected. Host again or join a new game.";
    banner.classList.add("show");
    setNetStatus("");
  }

  function teardownNet() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    for (const e of conns) { try { e.conn.close(); } catch (_) {} }
    conns = [];
    if (conn) { try { conn.close(); } catch (e) {} conn = null; }
    if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
    role = null;
  }

  function makeCode() {
    const C = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // omit easily-confused chars
    let s = "";
    for (let i = 0; i < 4; i++) s += C[(Math.random() * C.length) | 0];
    return s;
  }

  // Fetch TURN credentials from our serverless function once per session.
  // TURN relays traffic when direct P2P can't punch through NAT (mobile/CGNAT).
  // Falls back to STUN-only if the endpoint is missing (same-network still works).
  const STUN_ONLY = [{ urls: "stun:stun.l.google.com:19302" }];
  let cachedIce = null;
  async function getIceServers() {
    if (cachedIce) return cachedIce;
    try {
      const r = await fetch("/api/turn", { cache: "no-store" });
      if (r.ok) {
        const data = await r.json();
        let ice = data.iceServers;
        if (ice && !Array.isArray(ice)) ice = [ice];
        if (Array.isArray(ice) && ice.length) { cachedIce = ice; return ice; }
      }
    } catch (_) {}
    cachedIce = STUN_ONLY;
    return cachedIce;
  }

  // Keep the room alive across signaling-broker blips (wifi hiccup, brief sleep).
  // The P2P data channel is independent, so this only matters while waiting /
  // before the two peers have connected.
  let reconnectTimer = null;
  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      if (peer && !peer.destroyed && peer.disconnected) {
        try { peer.reconnect(); } catch (_) {}
        scheduleReconnect();   // keep retrying until the broker is back
      }
    }, 2000);
  }

  let hostRetries = 0;
  async function startHost() {
    if (!window.Peer) { setNetStatus("Online needs internet — PeerJS didn't load."); return; }
    teardownNet();
    submode = hostSubmode;          // lock in the chosen match type
    matchTarget = hostTarget;       // and the win target (0 = endless)
    mode = "lobby"; setActiveBtns(); setControlsLegend();
    setNetStatus("Starting…");
    const ice = await getIceServers();
    const code = makeCode();
    let opened = false;
    peer = new Peer("tankmaze-" + code, { config: { iceServers: ice } });
    peer.on("open", () => {
      hostRetries = 0;
      if (!opened) {
        opened = true;
        roomCode = code;
        joinUrl = location.origin + location.pathname + "?room=" + code;
        copyLinkBtn.style.display = "inline-block";
        setNetStatus('Code <b>' + code + '</b> — or hit Copy Link. Waiting…');
        bannerBig.textContent = "ROOM " + code;
        bannerBig.style.color = "var(--p1)";
        bannerSub.innerHTML =
          'Send your friend the <b style="color:#ffe27a">Copy Link</b> button below' +
          '<br/>(or the code <b style="color:#ffe27a;letter-spacing:3px">' + code + '</b>).' +
          '<br/>Waiting for them to join…';
        banner.classList.add("show");
      } else if (!conn) {
        // reconnected to broker while still waiting — room is live again
        setNetStatus('Reconnected. Code <b>' + code + '</b> — waiting…');
      }
    });
    peer.on("disconnected", () => {
      if (!peer || peer.destroyed) return;
      if (conns.length) return;                 // guests connected; data channels are independent
      if (mode !== "lobby" && mode !== "host") return;
      setNetStatus('<span style="color:#ffe27a">Connection dropped — reconnecting…</span>');
      scheduleReconnect();
    });
    peer.on("connection", (c) => {
      role = "host";
      c.on("open", () => onGuestOpen(c));
      c.on("data", (msg) => { const e = conns.find((x) => x.conn === c); if (e) onHostData(e.slot, msg); });
      c.on("close", () => { const e = conns.find((x) => x.conn === c); if (e) removeGuest(e.slot); });
      c.on("error", () => {});
    });
    peer.on("error", (e) => {
      const type = (e && e.type) || "network";
      if (type === "unavailable-id" && hostRetries < 5) {
        hostRetries++;                          // stale id on broker — fresh code
        setNetStatus("Code busy, retrying…");
        startHost();
      } else if (type === "network" || type === "socket-error" || type === "server-error") {
        setNetStatus('<span style="color:#ffe27a">Network hiccup — reconnecting…</span>');
        scheduleReconnect();
      } else {
        setNetStatus('<span style="color:var(--p2)">Error: ' + type + '</span>');
      }
    });
  }

  async function startGuest(raw) {
    if (!window.Peer) { setNetStatus("Online needs internet — PeerJS didn't load."); return; }
    const code = (raw || "").trim().toUpperCase();
    if (code.length !== 4) { setNetStatus("Enter the 4-character code."); return; }
    teardownNet();
    mode = "lobby"; setActiveBtns(); setControlsLegend();
    setNetStatus("Connecting to " + code + "…");
    const ice = await getIceServers();
    let gopened = false;
    peer = new Peer(undefined, { config: { iceServers: ice } });
    function connectToHost() {
      role = "guest";
      const c = peer.connect("tankmaze-" + code, { reliable: true });
      bindConn(c, () => {
        mode = "guest"; setActiveBtns(); setControlsLegend();
        netSend({ t: "nm", name: myDisplayName() });        // tell host my name
        setNetStatus("Connected! Joining the battle…");
        banner.classList.remove("show");
      });
    }
    peer.on("open", () => {
      if (!gopened) { gopened = true; connectToHost(); }
      else if (!conn || !conn.open) connectToHost();   // reconnected before joining — retry
    });
    peer.on("disconnected", () => {
      if (!peer || peer.destroyed) return;
      if (conn && conn.open) return;            // joined; gameplay continues regardless
      if (mode !== "lobby" && mode !== "guest") return;
      setNetStatus('<span style="color:#ffe27a">Reconnecting…</span>');
      scheduleReconnect();
    });
    peer.on("error", (e) => {
      let type = (e && e.type) || "network";
      if (type === "peer-unavailable") type = "no room with that code";
      else if (type === "network" || type === "socket-error" || type === "server-error") {
        setNetStatus('<span style="color:#ffe27a">Network hiccup — reconnecting…</span>');
        scheduleReconnect();
        return;
      }
      setNetStatus('<span style="color:var(--p2)">' + type + '</span>');
    });
  }

  // ---- Mode buttons + UI ----
  const modeAIBtn = document.getElementById("modeAI");
  const mode2PBtn = document.getElementById("mode2P");
  const modeOnlineBtn = document.getElementById("modeOnline");
  const onlinePanel = document.getElementById("onlinePanel");
  const aiPanel = document.getElementById("aiPanel");
  const hostBtn = document.getElementById("hostBtn");
  const joinBtn = document.getElementById("joinBtn");
  const joinCode = document.getElementById("joinCode");
  const copyLinkBtn = document.getElementById("copyLinkBtn");
  const netStatus = document.getElementById("netStatus");
  const controlsEl = document.getElementById("controls");
  const controlsDefault = controlsEl.innerHTML;

  function setNetStatus(html) { netStatus.innerHTML = html; }

  function resetScores() {
    players.forEach((p) => p && (p.score = 0));
    updateScoreboard();
    lastWinner = null;
  }

  function setActiveBtns() {
    const online = mode === "lobby" || mode === "host" || mode === "guest";
    modeAIBtn.classList.toggle("active", mode === "ai");
    mode2PBtn.classList.toggle("active", mode === "2p");
    modeOnlineBtn.classList.toggle("active", online);
    onlinePanel.style.display = online ? "flex" : "none";
    aiPanel.style.display = mode === "ai" ? "flex" : "none";
  }

  function setControlsLegend() {
    if (mode === "host" || mode === "guest") {
      const me = players[myId];
      const nm = esc(myDisplayName() || (me ? dn(me) : "You"));
      const css = me ? me.css : "var(--ink)";
      controlsEl.innerHTML =
        '<div>You are <b style="color:' + css + '">' + nm + '</b> &nbsp;' +
        '<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &middot; <kbd>Space</kbd> fire' +
        ' &middot; free-for-all</div>';
    } else {
      controlsEl.innerHTML = controlsDefault;
      const rc = document.getElementById("redControls");
      if (rc) rc.style.opacity = mode === "2p" ? "1" : "0.35";
    }
  }

  // Local modes (ai / 2p) and the online lobby.
  function setMode(m) {
    teardownNet();
    copyLinkBtn.style.display = "none";   // only meaningful while hosting
    mode = m;
    setActiveBtns();
    setControlsLegend();
    if (m === "lobby") {
      setupPlayers("lobby");                // empty roster until connected
      setNetStatus("");
      joinCode.value = "";
      resetScores();
      bannerBig.textContent = "ONLINE";
      bannerBig.style.color = "var(--ink)";
      bannerSub.innerHTML = "Set your name, then host or join below.";
      banner.classList.add("show");
    } else {
      setupPlayers(m);                      // ai / 2p roster
      resetScores();
      startRound();
    }
  }

  modeAIBtn.addEventListener("click", () => setMode("ai"));
  mode2PBtn.addEventListener("click", () => setMode("2p"));
  modeOnlineBtn.addEventListener("click", () => setMode("lobby"));

  // Bot difficulty (VS Computer)
  const aiLevelToggle = document.getElementById("aiLevelToggle");
  const AI_LEVELS = ["easy", "medium", "hard"];
  const AI_DESC = {
    easy: "Wanders the maze, shoots only on sight.",
    medium: "Hunts you through the maze, dodges shots, grabs runes.",
    hard: "Like Medium, but leads its shots and reacts faster.",
  };
  function updateAiLevelLabel() {
    aiLevelToggle.textContent = "Bot: " + aiLevel.charAt(0).toUpperCase() + aiLevel.slice(1);
    aiLevelToggle.title = AI_DESC[aiLevel];
  }
  aiLevelToggle.addEventListener("click", () => {
    aiLevel = AI_LEVELS[(AI_LEVELS.indexOf(aiLevel) + 1) % AI_LEVELS.length];
    updateAiLevelLabel();
    try { localStorage.setItem("tm_ailevel", aiLevel); } catch (_) {}
    aiLevelToggle.blur();
  });
  try { const sv = localStorage.getItem("tm_ailevel"); if (AI_LEVELS.includes(sv)) aiLevel = sv; } catch (_) {}
  updateAiLevelLabel();
  const submodeToggle = document.getElementById("submodeToggle");
  const modeHint = document.getElementById("modeHint");
  const SUBMODE_HINT = {
    standing: "Last tank alive wins the round.",
    respawn: "Respawn on death — most kills wins.",
  };
  function updateSubmodeLabel() {
    submodeToggle.textContent = "Mode: " + (hostSubmode === "respawn" ? "Deathmatch" : "Last Standing");
    modeHint.textContent = SUBMODE_HINT[hostSubmode];
    submodeToggle.title = SUBMODE_HINT[hostSubmode];   // desktop hover bonus
  }
  submodeToggle.addEventListener("click", () => {
    hostSubmode = hostSubmode === "standing" ? "respawn" : "standing";
    updateSubmodeLabel();
    submodeToggle.blur();
  });
  updateSubmodeLabel();

  const targetToggle = document.getElementById("targetToggle");
  const TARGETS = [0, 10, 20, 30];
  function updateTargetLabel() {
    targetToggle.textContent = "First to: " + (hostTarget ? hostTarget : "∞");
    targetToggle.title = hostTarget ? ("Match ends when someone reaches " + hostTarget) : "Endless — no match limit";
  }
  targetToggle.addEventListener("click", () => {
    hostTarget = TARGETS[(TARGETS.indexOf(hostTarget) + 1) % TARGETS.length];
    updateTargetLabel();
    targetToggle.blur();
  });
  updateTargetLabel();
  hostBtn.addEventListener("click", () => { startHost(); hostBtn.blur(); });
  joinBtn.addEventListener("click", () => { startGuest(joinCode.value); joinBtn.blur(); });
  joinCode.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { startGuest(joinCode.value); joinCode.blur(); }
  });
  copyLinkBtn.addEventListener("click", () => {
    const done = () => { setNetStatus('Link copied! Waiting for friend…'); copyLinkBtn.blur(); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(joinUrl).then(done, () => {
        setNetStatus('Copy failed — link: ' + joinUrl);
      });
    } else {
      setNetStatus('Share this link: ' + joinUrl);   // non-secure context fallback
    }
  });

  // ---- Touch controls (phones): drive the same key state as the keyboard ----
  // Pointer events cover touch+mouse; setPointerCapture keeps the release bound
  // to the button even if the finger slides off, and lets multiple fingers
  // (move + fire) work at once.
  function bindHold(el, key) {
    const down = (e) => {
      e.preventDefault();
      keys[key] = true;
      if (e.pointerId != null && el.setPointerCapture) {
        try { el.setPointerCapture(e.pointerId); } catch (_) {}
      }
      if (key === " ") handleFirePress();   // fire also restarts a finished round
    };
    const up = (e) => {
      if (e) e.preventDefault();
      keys[key] = false;
      if (key === " ") guestSuppressFire = false;
    };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("contextmenu", (e) => e.preventDefault());
  }
  bindHold(document.getElementById("fireBtn"), " ");

  // ---- Analog thumb-stick: push toward where the tank should go ----
  // The stick direction is a desired heading; updateJoystick() turns the tank
  // toward it and drives forward, expressed through the same w/a/s/d key state.
  const stick = document.getElementById("stick");
  const knob = document.getElementById("knob");
  const JS_DEAD = 0.22;            // ignore tiny nudges near centre
  let jsEngaged = false, jsId = null, jsDX = 0, jsDY = 0, jsMag = 0;
  let ctrlScheme = "stick";        // "stick" | "dpad" (mobile control scheme)

  function stickSet(clientX, clientY) {
    const r = stick.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = clientX - cx, dy = clientY - cy;
    const max = r.width / 2;
    const len = Math.hypot(dx, dy);
    jsDX = dx; jsDY = dy; jsMag = len / max;
    const clamped = Math.min(len, max);
    const ux = len > 0 ? dx / len : 0, uy = len > 0 ? dy / len : 0;
    knob.style.transform = "translate(" + ux * clamped + "px," + uy * clamped + "px)";
  }
  function stickClear() {
    jsEngaged = false; jsId = null; jsMag = 0;
    knob.style.transform = "translate(0,0)";
    keys["w"] = keys["a"] = keys["s"] = keys["d"] = false;
  }
  stick.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    jsEngaged = true; jsId = e.pointerId;
    try { stick.setPointerCapture(e.pointerId); } catch (_) {}
    stickSet(e.clientX, e.clientY);
  });
  stick.addEventListener("pointermove", (e) => {
    if (jsEngaged && e.pointerId === jsId) { e.preventDefault(); stickSet(e.clientX, e.clientY); }
  });
  stick.addEventListener("pointerup", (e) => { if (e.pointerId === jsId) stickClear(); });
  stick.addEventListener("pointercancel", (e) => { if (e.pointerId === jsId) stickClear(); });

  // Translate stick -> turn + drive for the tank this device controls.
  function updateJoystick() {
    if (ctrlScheme !== "stick") return;           // D-pad mode drives keys directly
    if (!jsEngaged) return;                       // idle => leave keys to the keyboard
    if (jsMag < JS_DEAD) { keys["w"] = keys["a"] = keys["s"] = keys["d"] = false; return; }
    const myTank = players[myId];                 // the tank this device controls
    if (!myTank) return;
    const desired = Math.atan2(jsDY, jsDX);
    const fwdDiff = angleDiff(myTank.angle, desired);             // turn to face the stick
    const revDiff = angleDiff(myTank.angle, desired + Math.PI);   // turn to back toward it
    // Car-like: if the stick points behind the tank, reverse straight back instead
    // of doing a (often impossible-in-a-corridor) U-turn.
    if (Math.abs(fwdDiff) <= Math.abs(revDiff)) {
      keys["w"] = true; keys["s"] = false;        // drive forward, steer toward stick
      keys["a"] = fwdDiff < -0.12;
      keys["d"] = fwdDiff > 0.12;
    } else {
      keys["w"] = false; keys["s"] = true;        // reverse, steer rear toward stick
      keys["a"] = revDiff < -0.12;
      keys["d"] = revDiff > 0.12;
    }
  }

  // ---- Control scheme toggle (mobile): joystick <-> D-pad ----
  const touchControls = document.getElementById("touchControls");
  const ctrlToggle = document.getElementById("ctrlToggle");
  document.querySelectorAll("#dpad .tbtn").forEach((b) => bindHold(b, b.dataset.k));
  function applyScheme(s) {
    ctrlScheme = s === "dpad" ? "dpad" : "stick";
    touchControls.classList.toggle("scheme-stick", ctrlScheme === "stick");
    touchControls.classList.toggle("scheme-dpad", ctrlScheme === "dpad");
    ctrlToggle.textContent = "Controls: " + (ctrlScheme === "stick" ? "Joystick" : "D-pad");
    stickClear();                                  // release any held joystick movement
    keys["w"] = keys["a"] = keys["s"] = keys["d"] = false;
    try { localStorage.setItem("tm_ctrl", ctrlScheme); } catch (_) {}
  }
  ctrlToggle.addEventListener("click", () => {
    applyScheme(ctrlScheme === "stick" ? "dpad" : "stick");
    ctrlToggle.blur();
  });
  let savedScheme = "stick";
  try { savedScheme = localStorage.getItem("tm_ctrl") || "stick"; } catch (_) {}
  applyScheme(savedScheme);

  // ---- Live stats badge: visitors + online now (polls /api/presence) ----
  const statsEl = document.getElementById("stats");
  let visitorIsNew = false;
  try {
    if (!localStorage.getItem("tm_vid")) {
      visitorIsNew = true;
      localStorage.setItem("tm_vid", Math.random().toString(36).slice(2) + Date.now().toString(36));
    }
  } catch (_) {}
  const presenceId = Math.random().toString(36).slice(2);
  let statsFirstPing = true;
  async function pingStats() {
    try {
      const markNew = statsFirstPing && visitorIsNew ? 1 : 0;
      const r = await fetch("/api/presence?id=" + presenceId + "&new=" + markNew, { cache: "no-store" });
      const d = await r.json();
      statsFirstPing = false;
      if (d && d.online != null) {
        statsEl.style.display = "";
        statsEl.textContent = d.online + " online · " + (d.total || 0) + " visits";
      } else {
        statsEl.style.display = "none";   // backend not configured -> hide badge
      }
    } catch (_) { /* network blip: keep last shown */ }
  }
  pingStats();
  setInterval(pingStats, 20000);

  // Read-only test hook (only when the URL contains "debug"); no effect otherwise.
  if (location.search.indexOf("debug") >= 0) {
    window.__tmState = () => players.filter(Boolean).map((p) => ({
      i: p.index, x: Math.round(p.x), y: Math.round(p.y), a: +p.angle.toFixed(3), al: p.alive, sc: p.score, rs: p.respawnIn, bf: p.bf,
    }));
    window.__tmMode = () => mode;
    window.__tmPow = () => powerups.map((r) => ({ type: r.type, x: Math.round(r.x), y: Math.round(r.y) }));
    window.__tmBfs = (fc, fr, tc, tr) => bfsNext({ c: fc, r: fr }, { c: tc, r: tr });
    window.__tmAi = () => aiLevel;
    window.__tmSetAi = (lvl) => { aiLevel = lvl; };
    window.__tmRestart = () => startRound();
    window.__tmBot = () => { const b = players[1], a = players[0]; if (!b || !a) return null;
      return { d: Math.round(Math.hypot(a.x - b.x, a.y - b.y)), los: hasLineOfSight(b.x, b.y, a.x, a.y), bAlive: b.alive, pAlive: a.alive, nb: bullets.length, ro: roundOver }; };
    window.__tmFloors = () => floorCells.map((c) => [c.c, c.r]);
    window.__tmIsWall = (c, r) => isWallCell(c, r);
    // drop a rune onto a tank so the next sim tick picks it up (test helper)
    window.__tmDropPow = (type, slot) => { const p = players[slot]; if (p) powerups.push({ type, c: 0, r: 0, x: p.x, y: p.y }); };
    window.__tmMaze = () => MAZE.join("\n");
    window.__tmSub = () => submode;
    window.__tmRoundOver = () => roundOver;
    window.__tmKill = (slot, bySlot) => { const v = players[slot]; if (v) onKill({ owner: players[bySlot] }, v); };
  }

  // ---- Boot ----
  // A "?room=CODE" link (shared by a host) drops the friend straight into joining.
  const roomParam = (new URLSearchParams(location.search).get("room") || "").trim().toUpperCase();
  if (/^[A-Z0-9]{4}$/.test(roomParam)) {
    setMode("lobby");
    joinCode.value = roomParam;
    startGuest(roomParam);
  } else {
    setMode("ai");
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
