<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>rete kebe fire!</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232b3622'/%3E%3Crect x='3' y='6' width='8' height='5' fill='%234fa3ff'/%3E%3Crect x='9' y='7.5' width='5' height='1.6' fill='%23e9efe0'/%3E%3C/svg%3E" />
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #11150f;
    --wall: #5c7340;
    --wall-edge: #7da155;
    --floor: #2b3622;
    --p1: #4fa3ff;
    --p2: #ff6b4f;
    --ink: #d8e0cc;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 3px;
    font-weight: 600;
  }
  #scoreboard {
    display: flex;
    gap: 28px;
    font-size: 15px;
    letter-spacing: 1px;
  }
  .score { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
  .p1 { color: var(--p1); } .p1 .dot { background: var(--p1); }
  .p2 { color: var(--p2); } .p2 .dot { background: var(--p2); }
  #wrap {
    position: relative;
    border: 2px solid #2c3622;
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    width: min(94vw, 56vh, 612px);   /* scale to fit phone screens, cap at native */
  }
  canvas {
    display: block;
    border-radius: 4px;
    width: 100%;
    height: auto;                    /* square maze keeps 1:1 from intrinsic size */
    touch-action: none;
  }
  #banner {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(10,12,8,0.78);
    border-radius: 4px;
    text-align: center;
  }
  #banner.show { display: flex; }
  #banner .big { font-size: 30px; letter-spacing: 2px; }
  #banner .sub { font-size: 13px; opacity: 0.8; letter-spacing: 1px; }
  #controls {
    display: flex;
    gap: 40px;
    font-size: 12px;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
  #controls b { color: var(--ink); }
  #modebar { display: flex; gap: 8px; }
  button {
    background: #2c3622;
    color: var(--ink);
    border: 1px solid #4f6238;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  button:hover { background: #3a4a2c; }
  button.active { background: #4f6238; border-color: #6f8a52; }
  kbd {
    background: #222a1a;
    border: 1px solid #4f6238;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
  }
  #onlinePanel {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    letter-spacing: 0.5px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }
  #joinCode {
    background: #222a1a;
    color: var(--ink);
    border: 1px solid #4f6238;
    border-radius: 4px;
    padding: 6px 10px;
    width: 86px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 4px;
    text-align: center;
    text-transform: uppercase;
  }
  #netStatus { opacity: 0.85; }
  #netStatus b { color: #ffe27a; letter-spacing: 3px; font-size: 14px; }

  /* ---- Touch controls: hidden on desktop, shown on touch devices ---- */
  #touchControls {
    display: none;
    width: min(94vw, 612px);
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    touch-action: none;
  }
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(2, 56px);
    gap: 6px;
  }
  #dpad .tbtn { grid-column: auto; }
  #bUp { grid-column: 2; grid-row: 1; }
  #bLeft { grid-column: 1; grid-row: 2; }
  #bDown { grid-column: 2; grid-row: 2; }
  #bRight { grid-column: 3; grid-row: 2; }
  .tbtn {
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    background: #2c3622;
    border: 1px solid #4f6238;
    border-radius: 10px;
    color: var(--ink);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .tbtn:active { background: #4f6238; }
  #fireBtn {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    font-size: 16px;
    letter-spacing: 2px;
    font-weight: 600;
    background: #5a2a22;
    border-color: var(--p2);
    color: #ffd9cf;
  }
  #fireBtn:active { background: var(--p2); color: #11150f; }

  @media (pointer: coarse) {
    body { gap: 8px; padding: 6px 0; justify-content: flex-start; }
    h1 { font-size: 15px; margin-top: 4px; }
    #touchControls { display: flex; }
    #controls { display: none; }   /* keyboard legend irrelevant on phones */
    button { padding: 8px 12px; }  /* bigger tap targets for mode/online */
  }
</style>
</head>
<body>
  <h1>rete kebe fire!</h1>
  <div id="scoreboard">
    <div class="score p1"><span class="dot"></span><span id="s1">0</span> Blue</div>
    <div class="score p2"><span id="s2">0</span> Red <span class="dot"></span></div>
  </div>

  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="banner">
      <div class="big" id="bannerBig"></div>
      <div class="sub" id="bannerSub">Press <kbd>Space</kbd> or <kbd>Enter</kbd> to play next round</div>
    </div>
  </div>

  <div id="modebar">
    <button id="modeAI" class="active">VS Computer</button>
    <button id="mode2P">2 Players</button>
    <button id="modeOnline">Online</button>
  </div>

  <div id="onlinePanel">
    <button id="hostBtn">Host Game</button>
    <span style="opacity:0.6">or join:</span>
    <input id="joinCode" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false" />
    <button id="joinBtn">Join</button>
    <button id="copyLinkBtn" style="display:none">Copy Link</button>
    <span id="netStatus"></span>
  </div>

  <div id="controls">
    <div><b>Blue</b> &nbsp; <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &middot; <kbd>Space</kbd> fire</div>
    <div id="redControls"><b>Red</b> &nbsp; <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> move &middot; <kbd>Enter</kbd> fire</div>
  </div>

  <div id="touchControls">
    <div id="dpad">
      <button class="tbtn" id="bUp" data-k="w" aria-label="forward">▲</button>
      <button class="tbtn" id="bLeft" data-k="a" aria-label="turn left">◀</button>
      <button class="tbtn" id="bDown" data-k="s" aria-label="reverse">▼</button>
      <button class="tbtn" id="bRight" data-k="d" aria-label="turn right">▶</button>
    </div>
    <button id="fireBtn" aria-label="fire">FIRE</button>
  </div>

<script>
(() => {
  "use strict";

  // ---- Maze layout (1 = wall, 0 = floor). Outer ring is solid. ----
  const MAZE = [
    "111111111111111111",
    "100000000000000001",
    "101111011110111101",
    "100001000010000101",
    "101101011010110101",
    "101000000000010001",
    "101011110111011101",
    "100010000000010001",
    "101110101110101101",
    "100000101000101001",
    "101111101011111101",
    "100000001000000001",
    "101101110111011101",
    "101000100000100101",
    "101011101110101101",
    "100010000000010001",
    "100000000000000001",
    "111111111111111111",
  ];
  const ROWS = MAZE.length;
  const COLS = MAZE[0].length;
  const TILE = 34;
  const W = COLS * TILE;
  const H = ROWS * TILE;

  const canvas = document.getElementById("game");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  const banner = document.getElementById("banner");
  const bannerBig = document.getElementById("bannerBig");
  const bannerSub = document.getElementById("bannerSub");
  const s1El = document.getElementById("s1");
  const s2El = document.getElementById("s2");

  // ---- Wall helpers ----
  function isWallCell(c, r) {
    if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return true;
    return MAZE[r][c] === "1";
  }
  // Circle (tank/bullet) vs wall-cells: returns true if point/radius overlaps any wall.
  function circleHitsWall(x, y, radius) {
    const minC = Math.floor((x - radius) / TILE);
    const maxC = Math.floor((x + radius) / TILE);
    const minR = Math.floor((y - radius) / TILE);
    const maxR = Math.floor((y + radius) / TILE);
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        if (!isWallCell(c, r)) continue;
        const nx = Math.max(c * TILE, Math.min(x, c * TILE + TILE));
        const ny = Math.max(r * TILE, Math.min(y, r * TILE + TILE));
        const dx = x - nx, dy = y - ny;
        if (dx * dx + dy * dy < radius * radius) return true;
      }
    }
    return false;
  }

  // ---- Open floor cells, used to place tanks far apart ----
  const floorCells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (MAZE[r][c] === "0") floorCells.push({ c, r });

  function cellCenter(cell) {
    return { x: cell.c * TILE + TILE / 2, y: cell.r * TILE + TILE / 2 };
  }

  // ---- Input ----
  const keys = {};
  const FIRE1 = " ";
  const FIRE2 = "enter";
  window.addEventListener("keydown", (e) => {
    // don't hijack typing in the room-code field
    if (e.target && e.target.tagName === "INPUT") return;
    const k = e.key.toLowerCase();
    if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(k))
      e.preventDefault();
    keys[k] = true;
    if ((k === " " || k === "enter") && roundOver) handleFirePress();
  });
  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    keys[k] = false;
    if (k === " ") guestSuppressFire = false;
  });

  // The "fire" action also restarts a finished round. Shared by keyboard + touch.
  function handleFirePress() {
    if (!roundOver) return;
    if (mode === "guest") {
      guestSuppressFire = true;            // don't auto-fire the round-start press
      netSend({ t: "start" });             // only host owns startRound
    } else if (mode === "ai" || mode === "2p" || mode === "host") {
      startRound();
    }
  }

  // ---- Tank ----
  const TANK_R = TILE * 0.34;
  const TANK_SPEED = 95;          // px/sec
  const TANK_TURN = 3.0;          // rad/sec
  const RELOAD = 0.65;            // sec between shots
  const BULLET_SPEED = 230;       // px/sec
  const BULLET_R = 3.5;
  const BULLET_LIFE = 4.0;        // sec
  const MAX_BOUNCE = 2;

  class Tank {
    constructor(color, isPlayer) {
      this.color = color;
      this.isPlayer = isPlayer;
      this.x = 0; this.y = 0; this.angle = 0;
      this.cooldown = 0; this.alive = false;
    }
    reset(cell) {
      const center = cellCenter(cell);
      this.x = center.x;
      this.y = center.y;
      this.angle = Math.random() * Math.PI * 2;
      this.cooldown = 0;
      this.alive = true;
      // AI memory
      this.aiTurnGoal = this.angle;
      this.aiRepathIn = 0;
    }
    tryMove(dist) {
      const nx = this.x + Math.cos(this.angle) * dist;
      const ny = this.y + Math.sin(this.angle) * dist;
      // axis-separated so tanks slide along walls instead of sticking
      if (!circleHitsWall(nx, this.y, TANK_R)) this.x = nx;
      if (!circleHitsWall(this.x, ny, TANK_R)) this.y = ny;
    }
    canFire() { return this.cooldown <= 0; }
    fire(bullets) {
      if (!this.canFire()) return;
      this.cooldown = RELOAD;
      const mx = this.x + Math.cos(this.angle) * (TANK_R + BULLET_R + 1);
      const my = this.y + Math.sin(this.angle) * (TANK_R + BULLET_R + 1);
      bullets.push(new Bullet(mx, my, this.angle, this));
    }
  }

  class Bullet {
    constructor(x, y, angle, owner) {
      this.x = x; this.y = y;
      this.vx = Math.cos(angle) * BULLET_SPEED;
      this.vy = Math.sin(angle) * BULLET_SPEED;
      this.owner = owner;
      this.life = BULLET_LIFE;
      this.bounces = 0;
      this.dead = false;
      this.armTime = 0.06; // brief self-immunity so muzzle doesn't self-kill
    }
    step(dt) {
      this.life -= dt;
      this.armTime -= dt;
      if (this.life <= 0) { this.dead = true; return; }

      // move X, bounce on wall
      let nx = this.x + this.vx * dt;
      if (circleHitsWall(nx, this.y, BULLET_R)) {
        this.vx = -this.vx;
        nx = this.x + this.vx * dt;
        if (++this.bounces > MAX_BOUNCE) { this.dead = true; return; }
      }
      this.x = nx;

      // move Y, bounce on wall
      let ny = this.y + this.vy * dt;
      if (circleHitsWall(this.x, ny, BULLET_R)) {
        this.vy = -this.vy;
        ny = this.y + this.vy * dt;
        if (++this.bounces > MAX_BOUNCE) { this.dead = true; return; }
      }
      this.y = ny;
    }
  }

  // ---- Game state ----
  // modes: "ai" | "2p" | "lobby" (online, not connected) | "host" | "guest"
  let mode = "ai";
  const blue = new Tank("blue", true);
  const red = new Tank("red", false);
  let bullets = [];
  let roundOver = false;
  let lastWinner = null;        // "blue" | "red" | "draw" | null  (synced to guest)
  let score1 = 0, score2 = 0;
  let endTimer = 0;

  // ---- Net state ----
  let peer = null, conn = null, role = null;   // role: "host" | "guest"
  let guestSuppressFire = false;               // guest: swallow the round-start Space
  let lastPeerMsg = 0;                          // perf-time of last packet from the other side
  const STALE_MS = 10000;                       // no packets this long => treat as disconnected
  let roomCode = "", joinUrl = "";              // current hosted room + its shareable link
  // remote player's input, applied host-side to the red tank
  const guestInput = { fwd: false, back: false, left: false, right: false, fire: false };

  function farPair() {
    // pick two floor cells with large separation
    let best = null, bestD = -1;
    for (let i = 0; i < 60; i++) {
      const a = floorCells[(Math.random() * floorCells.length) | 0];
      const b = floorCells[(Math.random() * floorCells.length) | 0];
      const d = (a.c - b.c) ** 2 + (a.r - b.r) ** 2;
      if (d > bestD) { bestD = d; best = [a, b]; }
    }
    return best;
  }

  function startRound() {
    const [a, b] = farPair();
    blue.reset(a);
    red.reset(b);
    bullets = [];
    roundOver = false;
    lastWinner = null;
    endTimer = 0;
    keys[" "] = false;       // consume the Space/Enter that started the round
    keys["enter"] = false;   // so the fresh tank doesn't fire on spawn
    guestInput.fire = false; // same for the remote player's spawn press
    banner.classList.remove("show");
  }

  function endRound(winner) {
    if (roundOver) return;
    roundOver = true;
    lastWinner = winner;
    if (winner === "blue") score1++;
    else if (winner === "red") score2++;
    s1El.textContent = score1;
    s2El.textContent = score2;
    showResult(winner);
  }

  // Banner text for a finished round (host shows it locally; guest shows it
  // from the synced winner — neutral wording so it reads right on both ends).
  function showResult(winner) {
    if (winner === "blue") { bannerBig.textContent = "BLUE WINS"; bannerBig.style.color = "var(--p1)"; }
    else if (winner === "red") { bannerBig.textContent = (mode === "ai" ? "YOU LOSE" : "RED WINS"); bannerBig.style.color = "var(--p2)"; }
    else { bannerBig.textContent = "DRAW"; bannerBig.style.color = "var(--ink)"; }
    bannerSub.innerHTML = 'Press <kbd>Space</kbd> or <kbd>Enter</kbd> to play next round';
    banner.classList.add("show");
  }

  // ---- Line-of-sight: is target visible (no wall between)? ----
  function hasLineOfSight(ax, ay, bx, by) {
    const dist = Math.hypot(bx - ax, by - ay);
    const steps = Math.ceil(dist / (TILE * 0.4));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const px = ax + (bx - ax) * t;
      const py = ay + (by - ay) * t;
      if (isWallCell(Math.floor(px / TILE), Math.floor(py / TILE))) return false;
    }
    return true;
  }

  function angleDiff(a, b) {
    let d = (b - a) % (Math.PI * 2);
    if (d > Math.PI) d -= Math.PI * 2;
    if (d < -Math.PI) d += Math.PI * 2;
    return d;
  }

  // ---- AI for red tank ----
  function updateAI(dt) {
    if (!red.alive) return;
    const dx = blue.x - red.x;
    const dy = blue.y - red.y;
    const targetAngle = Math.atan2(dy, dx);
    const los = hasLineOfSight(red.x, red.y, blue.x, blue.y);

    let desired;
    if (los) {
      // aim at player
      desired = targetAngle;
    } else {
      // wander: pick a new heading periodically, prefer current direction
      red.aiRepathIn -= dt;
      if (red.aiRepathIn <= 0) {
        red.aiTurnGoal = red.angle + (Math.random() - 0.5) * Math.PI * 1.2;
        red.aiRepathIn = 0.6 + Math.random() * 0.8;
      }
      desired = red.aiTurnGoal;
    }

    // rotate toward desired heading
    const diff = angleDiff(red.angle, desired);
    const turn = TANK_TURN * dt;
    red.angle += Math.max(-turn, Math.min(turn, diff));

    // move forward; if blocked, nudge a turn so it doesn't grind a wall
    const before = { x: red.x, y: red.y };
    red.tryMove(TANK_SPEED * dt);
    const moved = Math.hypot(red.x - before.x, red.y - before.y);
    if (moved < TANK_SPEED * dt * 0.3 && !los) {
      red.aiTurnGoal = red.angle + (Math.random() < 0.5 ? 1 : -1) * (0.7 + Math.random());
      red.aiRepathIn = 0.5;
    }

    // fire if roughly aimed and can see player
    if (los && Math.abs(diff) < 0.20 && red.canFire()) red.fire(bullets);
  }

  // ---- Player control ----
  // Read a normalized input struct off the global keyboard for a given keymap.
  function readInput(kFwd, kBack, kLeft, kRight, kFire) {
    return {
      fwd: !!keys[kFwd], back: !!keys[kBack],
      left: !!keys[kLeft], right: !!keys[kRight], fire: !!keys[kFire],
    };
  }
  // Apply a normalized input struct to a tank. Used identically for local
  // players and for the remote (guest) player on the host's simulation.
  function driveTank(tank, dt, inp) {
    if (!tank.alive) return;
    if (inp.left) tank.angle -= TANK_TURN * dt;
    if (inp.right) tank.angle += TANK_TURN * dt;
    if (inp.fwd) tank.tryMove(TANK_SPEED * dt);
    if (inp.back) tank.tryMove(-TANK_SPEED * dt * 0.6);
    if (inp.fire) tank.fire(bullets);
  }

  function tankHit(bullet, tank) {
    if (!tank.alive) return false;
    if (bullet.owner === tank && bullet.armTime > 0) return false;
    const dx = bullet.x - tank.x, dy = bullet.y - tank.y;
    return dx * dx + dy * dy < (TANK_R + BULLET_R) ** 2;
  }

  // ---- Update loop ----
  function update(dt) {
    if (roundOver) return;

    blue.cooldown = Math.max(0, blue.cooldown - dt);
    red.cooldown = Math.max(0, red.cooldown - dt);

    // Blue is the local player in ai / 2p / host. (Guest never runs update.)
    driveTank(blue, dt, readInput("w", "s", "a", "d", FIRE1));

    if (mode === "2p")
      driveTank(red, dt, readInput("arrowup", "arrowdown", "arrowleft", "arrowright", FIRE2));
    else if (mode === "host")
      driveTank(red, dt, guestInput);          // remote friend's tank
    else
      updateAI(dt);                            // mode === "ai"

    for (const b of bullets) {
      b.step(dt);
      if (b.dead) continue;
      if (tankHit(b, blue)) { blue.alive = false; b.dead = true; }
      if (tankHit(b, red)) { red.alive = false; b.dead = true; }
    }
    bullets = bullets.filter((b) => !b.dead);

    if (!blue.alive || !red.alive) {
      endTimer += dt;
      if (endTimer > 0.7) {
        if (!blue.alive && !red.alive) endRound("draw");
        else if (!red.alive) endRound("blue");
        else endRound("red");
      }
    }
  }

  // ---- Render ----
  function drawMaze() {
    ctx.fillStyle = getCSS("--floor");
    ctx.fillRect(0, 0, W, H);
    const wall = getCSS("--wall");
    const edge = getCSS("--wall-edge");
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (MAZE[r][c] !== "1") continue;
        const x = c * TILE, y = r * TILE;
        ctx.fillStyle = wall;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = edge;
        ctx.fillRect(x, y, TILE, 3);
        ctx.fillRect(x, y, 3, TILE);
      }
    }
  }

  function drawTank(t) {
    if (!t.alive) return;
    const main = t.color === "blue" ? getCSS("--p1") : getCSS("--p2");
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle);
    // body
    ctx.fillStyle = main;
    const s = TANK_R;
    ctx.fillRect(-s, -s * 0.85, s * 2, s * 1.7);
    // treads
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(-s, -s * 0.95, s * 2, s * 0.28);
    ctx.fillRect(-s, s * 0.67, s * 2, s * 0.28);
    // barrel
    ctx.fillStyle = "#e9efe0";
    ctx.fillRect(s * 0.2, -s * 0.18, s * 1.5, s * 0.36);
    // turret
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fill();
    ctx.restore();
  }

  function drawBullet(b) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
    ctx.fillStyle = "#ffe27a";
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function render() {
    drawMaze();
    bullets.forEach(drawBullet);
    drawTank(blue);
    drawTank(red);
  }

  // CSS var reader (cached)
  const cssCache = {};
  function getCSS(name) {
    if (!cssCache[name])
      cssCache[name] = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return cssCache[name];
  }

  // ---- Main loop ----
  let last = performance.now();
  let netAccum = 0;
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // clamp big tab-switch gaps

    // backstop for PeerJS's unreliable close event: no packets => disconnected
    if ((mode === "host" || mode === "guest") && conn && now - lastPeerMsg > STALE_MS)
      handleDisconnect();

    if (mode === "host") {
      update(dt);
      // stream state ~40Hz (cheaper than 60, still smooth)
      netAccum += dt;
      if (netAccum >= 0.025) { netAccum = 0; sendState(); }
    } else if (mode === "guest") {
      sendInput();        // guest only sends input; render uses last packet
    } else if (mode !== "lobby") {
      update(dt);         // ai / 2p
    }
    // lobby: no simulation, just render the frozen board

    render();
    requestAnimationFrame(frame);
  }

  // ---- Networking (host-authoritative WebRTC via PeerJS) ----
  // Host runs the whole simulation and owns Blue; the guest owns Red, sends its
  // key presses, and just renders whatever state the host streams back.
  function netSend(obj) {
    if (conn && conn.open) { try { conn.send(obj); } catch (e) {} }
  }

  function sendState() {
    if (!conn || !conn.open) return;
    netSend({
      t: "s",
      bx: Math.round(blue.x), by: Math.round(blue.y), ba: +blue.angle.toFixed(3), bA: blue.alive,
      rx: Math.round(red.x), ry: Math.round(red.y), ra: +red.angle.toFixed(3), rA: red.alive,
      bl: bullets.map((b) => [Math.round(b.x), Math.round(b.y)]),
      s1: score1, s2: score2, ro: roundOver, w: lastWinner,
    });
  }

  function sendInput() {
    if (!conn || !conn.open) return;
    netSend({
      t: "i",
      f: !!keys["w"], b: !!keys["s"], l: !!keys["a"], r: !!keys["d"],
      x: !!keys[" "] && !guestSuppressFire,
    });
  }

  function applyState(m) {
    blue.x = m.bx; blue.y = m.by; blue.angle = m.ba; blue.alive = m.bA;
    red.x = m.rx; red.y = m.ry; red.angle = m.ra; red.alive = m.rA;
    bullets = (m.bl || []).map(([x, y]) => ({ x, y }));
    if (m.s1 !== score1) { score1 = m.s1; s1El.textContent = score1; }
    if (m.s2 !== score2) { score2 = m.s2; s2El.textContent = score2; }
    roundOver = m.ro;
    if (m.ro) showResult(m.w);
    else banner.classList.remove("show");
  }

  function onData(msg) {
    if (!msg || typeof msg !== "object") return;
    lastPeerMsg = performance.now();           // any packet => peer still alive
    if (role === "host") {
      if (msg.t === "i") {
        guestInput.fwd = !!msg.f; guestInput.back = !!msg.b;
        guestInput.left = !!msg.l; guestInput.right = !!msg.r; guestInput.fire = !!msg.x;
      } else if (msg.t === "start") {
        if (roundOver) startRound();          // host owns the restart
      }
    } else if (role === "guest") {
      if (msg.t === "s") applyState(msg);
    }
  }

  function bindConn(c, onOpen) {
    conn = c;
    c.on("open", () => { lastPeerMsg = performance.now(); onOpen(); });
    c.on("data", onData);
    c.on("close", handleDisconnect);           // fires sometimes; heartbeat is the backstop
    c.on("error", () => setNetStatus('<span style="color:var(--p2)">Connection error</span>'));
  }

  function handleDisconnect() {
    if (mode !== "host" && mode !== "guest") return;   // only while in a live session
    conn = null;
    guestInput.fwd = guestInput.back = guestInput.left = guestInput.right = guestInput.fire = false;
    mode = "lobby";
    setActiveBtns(); setControlsLegend();
    bannerBig.textContent = "DISCONNECTED";
    bannerBig.style.color = "var(--p2)";
    bannerSub.innerHTML = "Friend disconnected. Host again or join a new game.";
    banner.classList.add("show");
    setNetStatus("");
  }

  function teardownNet() {
    if (conn) { try { conn.close(); } catch (e) {} conn = null; }
    if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
    role = null;
  }

  function makeCode() {
    const C = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // omit easily-confused chars
    let s = "";
    for (let i = 0; i < 4; i++) s += C[(Math.random() * C.length) | 0];
    return s;
  }

  let hostRetries = 0;
  function startHost() {
    if (!window.Peer) { setNetStatus("Online needs internet — PeerJS didn't load."); return; }
    teardownNet();
    mode = "lobby"; setActiveBtns(); setControlsLegend();
    const code = makeCode();
    setNetStatus("Starting…");
    peer = new Peer("tankmaze-" + code);
    peer.on("open", () => {
      hostRetries = 0;
      roomCode = code;
      joinUrl = location.origin + location.pathname + "?room=" + code;
      copyLinkBtn.style.display = "inline-block";
      setNetStatus('Code <b>' + code + '</b> — or hit Copy Link. Waiting…');
      bannerBig.textContent = "ROOM " + code;
      bannerBig.style.color = "var(--p1)";
      bannerSub.innerHTML =
        'Send your friend the <b style="color:#ffe27a">Copy Link</b> button below' +
        '<br/>(or the code <b style="color:#ffe27a;letter-spacing:3px">' + code + '</b>).' +
        '<br/>Waiting for them to join…';
      banner.classList.add("show");
    });
    peer.on("connection", (c) => {
      role = "host";
      bindConn(c, () => {
        mode = "host"; setActiveBtns(); setControlsLegend();
        setNetStatus('Connected! You are <b style="color:var(--p1)">BLUE</b>.');
        resetScores();
        startRound();
      });
    });
    peer.on("error", (e) => {
      const type = (e && e.type) || "network";
      if (type === "unavailable-id" && hostRetries < 5) {
        hostRetries++;                          // stale id on broker — fresh code
        setNetStatus("Code busy, retrying…");
        startHost();
      } else {
        setNetStatus('<span style="color:var(--p2)">Error: ' + type + '</span>');
      }
    });
  }

  function startGuest(raw) {
    if (!window.Peer) { setNetStatus("Online needs internet — PeerJS didn't load."); return; }
    const code = (raw || "").trim().toUpperCase();
    if (code.length !== 4) { setNetStatus("Enter the 4-character code."); return; }
    teardownNet();
    mode = "lobby"; setActiveBtns(); setControlsLegend();
    setNetStatus("Connecting to " + code + "…");
    peer = new Peer();
    peer.on("open", () => {
      role = "guest";
      const c = peer.connect("tankmaze-" + code, { reliable: true });
      bindConn(c, () => {
        mode = "guest"; setActiveBtns(); setControlsLegend();
        setNetStatus('Connected! You are <b style="color:var(--p2)">RED</b>.');
        banner.classList.remove("show");
      });
    });
    peer.on("error", (e) => {
      let type = (e && e.type) || "network";
      if (type === "peer-unavailable") type = "no room with that code";
      setNetStatus('<span style="color:var(--p2)">' + type + '</span>');
    });
  }

  // ---- Mode buttons + UI ----
  const modeAIBtn = document.getElementById("modeAI");
  const mode2PBtn = document.getElementById("mode2P");
  const modeOnlineBtn = document.getElementById("modeOnline");
  const onlinePanel = document.getElementById("onlinePanel");
  const hostBtn = document.getElementById("hostBtn");
  const joinBtn = document.getElementById("joinBtn");
  const joinCode = document.getElementById("joinCode");
  const copyLinkBtn = document.getElementById("copyLinkBtn");
  const netStatus = document.getElementById("netStatus");
  const controlsEl = document.getElementById("controls");
  const controlsDefault = controlsEl.innerHTML;

  function setNetStatus(html) { netStatus.innerHTML = html; }

  function resetScores() {
    score1 = 0; score2 = 0;
    s1El.textContent = 0; s2El.textContent = 0;
    lastWinner = null;
  }

  function setActiveBtns() {
    const online = mode === "lobby" || mode === "host" || mode === "guest";
    modeAIBtn.classList.toggle("active", mode === "ai");
    mode2PBtn.classList.toggle("active", mode === "2p");
    modeOnlineBtn.classList.toggle("active", online);
    onlinePanel.style.display = online ? "flex" : "none";
  }

  function setControlsLegend() {
    if (mode === "host" || mode === "guest") {
      const who = mode === "host" ? "BLUE" : "RED";
      const col = mode === "host" ? "--p1" : "--p2";
      controlsEl.innerHTML =
        '<div>You are <b style="color:var(' + col + ')">' + who + '</b> &nbsp;' +
        '<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &middot; <kbd>Space</kbd> fire' +
        ' &middot; opponent is the other tank</div>';
    } else {
      controlsEl.innerHTML = controlsDefault;
      const rc = document.getElementById("redControls");
      if (rc) rc.style.opacity = mode === "2p" ? "1" : "0.35";
    }
  }

  // Local modes (ai / 2p) and the online lobby.
  function setMode(m) {
    teardownNet();
    copyLinkBtn.style.display = "none";   // only meaningful while hosting
    mode = m;
    setActiveBtns();
    setControlsLegend();
    if (m === "lobby") {
      setNetStatus("");
      joinCode.value = "";
      resetScores();
      bannerBig.textContent = "ONLINE";
      bannerBig.style.color = "var(--ink)";
      bannerSub.innerHTML = "Host a game and share the code, or enter a friend's code to join.";
      banner.classList.add("show");
    } else {
      resetScores();
      startRound();
    }
  }

  modeAIBtn.addEventListener("click", () => setMode("ai"));
  mode2PBtn.addEventListener("click", () => setMode("2p"));
  modeOnlineBtn.addEventListener("click", () => setMode("lobby"));
  hostBtn.addEventListener("click", () => { startHost(); hostBtn.blur(); });
  joinBtn.addEventListener("click", () => { startGuest(joinCode.value); joinBtn.blur(); });
  joinCode.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { startGuest(joinCode.value); joinCode.blur(); }
  });
  copyLinkBtn.addEventListener("click", () => {
    const done = () => { setNetStatus('Link copied! Waiting for friend…'); copyLinkBtn.blur(); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(joinUrl).then(done, () => {
        setNetStatus('Copy failed — link: ' + joinUrl);
      });
    } else {
      setNetStatus('Share this link: ' + joinUrl);   // non-secure context fallback
    }
  });

  // ---- Touch controls (phones): drive the same key state as the keyboard ----
  // Pointer events cover touch+mouse; setPointerCapture keeps the release bound
  // to the button even if the finger slides off, and lets multiple fingers
  // (move + fire) work at once.
  function bindHold(el, key) {
    const down = (e) => {
      e.preventDefault();
      keys[key] = true;
      if (e.pointerId != null && el.setPointerCapture) {
        try { el.setPointerCapture(e.pointerId); } catch (_) {}
      }
      if (key === " ") handleFirePress();   // fire also restarts a finished round
    };
    const up = (e) => {
      if (e) e.preventDefault();
      keys[key] = false;
      if (key === " ") guestSuppressFire = false;
    };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("contextmenu", (e) => e.preventDefault());
  }
  document.querySelectorAll("#dpad .tbtn").forEach((b) => bindHold(b, b.dataset.k));
  bindHold(document.getElementById("fireBtn"), " ");

  // ---- Boot ----
  // A "?room=CODE" link (shared by a host) drops the friend straight into joining.
  const roomParam = (new URLSearchParams(location.search).get("room") || "").trim().toUpperCase();
  if (/^[A-Z0-9]{4}$/.test(roomParam)) {
    setMode("lobby");
    joinCode.value = roomParam;
    startGuest(roomParam);
  } else {
    setMode("ai");
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
